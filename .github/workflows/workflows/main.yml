name: Daily YouTube Automation
on:
  schedule:
    - cron: '0 10 * * *' # Runs at 10 AM UTC daily
  workflow_dispatch: # Allows you to click "Run" manually

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Reconstruct Auth Files
        run: |
          echo '${{ secrets.YT_CLIENT_SECRET }}' > client_secret.json
          echo '${{ secrets.YT_TOKEN }}' > token.json

      - name: Run Farm
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python generator.py