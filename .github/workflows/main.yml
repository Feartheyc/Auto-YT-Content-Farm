name: Daily YouTube Automation
on:
  schedule:
    - cron: '0 10 * * *' # Runs at 10:00 AM UTC every day
  workflow_dispatch: # Allows you to manually trigger it from the Actions tab

jobs:
  run-farm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Reconstruct Auth Files
        # This takes your secret text and turns it back into real files for the script
        run: |
          echo '${{ secrets.YT_CLIENT_SECRET }}' > client_secret.json
          echo '${{ secrets.YT_TOKEN }}' > token.json

      - name: Run Auto-YT Content Farm
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python generator.py
